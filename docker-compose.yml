version: '3.8'

services:
  web:
    build: .
    container_name: php_my_website
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: ptdp
      MYSQL_USER: ptdp_user        # <-- Променено от root на ptdp_user
      MYSQL_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      # Това автоматично импортира твоя SQL файл в базата данни!
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
      # Това пази данните ти на компютъра, за да не се изтрият при рестарт
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: